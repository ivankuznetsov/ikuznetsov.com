<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Social card: a terminal where the manifesto is the echoed output -->
  <defs>
    <clipPath id="win"><rect x="64" y="60" width="1072" height="510" rx="16"/></clipPath>
  </defs>

  <!-- page background -->
  <rect width="1200" height="630" fill="#14181d"/>

  <!-- terminal window -->
  <rect x="64" y="60" width="1072" height="510" rx="16" fill="#1e2227" stroke="#2c333b" stroke-width="2"/>

  <g clip-path="url(#win)">
    <!-- title bar -->
    <rect x="64" y="60" width="1072" height="46" fill="#252b32"/>
    <circle cx="100" cy="83" r="7" fill="#e0635c"/>
    <circle cx="124" cy="83" r="7" fill="#e0a458"/>
    <circle cx="148" cy="83" r="7" fill="#7aa468"/>
    <text x="600" y="89" font-family="'JetBrainsMono Nerd Font', ui-monospace, monospace" font-size="18" fill="#8a939e" text-anchor="middle">ikuznetsov.com</text>
  </g>

  <!-- terminal content -->
  <g font-family="'JetBrainsMono Nerd Font', ui-monospace, monospace">
    <!-- prompt -->
    <text xml:space="preserve" x="104" y="190" font-size="30"><tspan fill="#7aa468">~</tspan><tspan fill="#8a939e"> $ </tspan><tspan fill="#e6e9ec">echo $WHO_CAN_BUILD</tspan></text>

    <!-- headline = the echoed output -->
    <text x="100" y="318" font-size="78" font-weight="bold" fill="#eef2f5">AI is changing</text>
    <text xml:space="preserve" x="100" y="408" font-size="78" font-weight="bold"><tspan fill="#eef2f5">who gets to </tspan><tspan fill="#8ab87a">build</tspan></text>

    <!-- muted comment -->
    <text x="104" y="476" font-size="24" fill="#5f6b76"># the gate used to be other people. not anymore.</text>

    <!-- next prompt + cursor -->
    <text xml:space="preserve" x="104" y="528" font-size="30"><tspan fill="#7aa468">~</tspan><tspan fill="#8a939e"> $ </tspan><tspan fill="#eef2f5">█</tspan></text>
  </g>
</svg>
